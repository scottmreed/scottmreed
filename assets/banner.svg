<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 168" width="920" height="168" role="img" aria-label="Animated banner: benzene ring, terminal caret, and simple graph over waves. Subtitle: Tools scientists actually want to use.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="waveA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>
  <rect width="920" height="168" rx="14" fill="url(#bg)"/>
  <rect width="920" height="168" rx="14" fill="url(#accent)" fill-opacity="0">
    <animate attributeName="fill-opacity" values="0;0.07;0;0.05;0" dur="14s" repeatCount="indefinite"/>
  </rect>
  <g opacity="0.9">
    <g>
      <path fill="url(#waveA)" d="M0 118 C 115 98, 205 138, 320 118 C 435 98, 525 138, 640 118 C 755 98, 845 138, 960 118 L 960 168 L 0 168 Z"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;-120 0;0 0" dur="9s" repeatCount="indefinite"/>
    </g>
    <g>
      <path fill="url(#waveB)" d="M-160 132 C -30 108, 70 152, 200 128 C 330 104, 430 148, 560 124 C 690 100, 790 144, 920 120 C 1050 96, 1150 140, 1280 116 L 1280 168 L -160 168 Z"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;100 0;0 0" dur="11s" repeatCount="indefinite"/>
    </g>
  </g>
  <g transform="translate(22 36)" fill="none" stroke="#99f6e4" stroke-width="2.2" stroke-linejoin="round" opacity="0.94">
    <polygon points="34,6 57.25,19.5 57.25,46.5 34,60 10.75,46.5 10.75,19.5">
      <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="34" cy="33" r="11" stroke="#67e8f9" stroke-width="1.6">
      <animate attributeName="stroke-opacity" values="0.55;0.95;0.55" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(382 34)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="0" y="44" fill="#94a3b8" font-size="26" font-weight="600">&gt;</text>
    <text x="18" y="44" fill="#64748b" font-size="26">_</text>
    <rect x="44" y="18" width="3" height="30" rx="0.5" fill="#f1f5f9">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.05s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g transform="translate(758 52)" fill="none" stroke="#fcd34d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <line x1="0" y1="10" x2="36" y2="10"/>
    <line x1="36" y1="10" x2="72" y2="10"/>
    <circle cx="0" cy="10" r="4" fill="#0f172a" stroke="#fde68a" stroke-width="1.5"/>
    <circle cx="36" cy="10" r="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <circle cx="72" cy="10" r="4" fill="#0f172a" stroke="#fde68a" stroke-width="1.5"/>
  </g>
  <text x="460" y="118" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="0.02em">Tools scientists actually want to use</text>
  <text x="460" y="142" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" letter-spacing="0.28em">SMILES · MCP · RDKit · TEACHING</text>
</svg>
