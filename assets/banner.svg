    <circle cx="72" cy="10" r="4" fill="#0f172a" stroke="#fde68a" stroke-width="1.5"/>
  </g>
  <text x="460" y="68" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="0.02em">Tools scientists actually want to use</text>
  <text x="460" y="92" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" letter-spacing="0.28em">SMILES · MCP · RDKit · TEACHING</text>
