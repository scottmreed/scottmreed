<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" role="img" aria-label="YAML-style profile card typing on screen">
  <defs>
    <clipPath id="y0"><rect x="16" y="14" width="0" height="18"><animate attributeName="width" from="0" to="180" dur="0.55s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y1"><rect x="16" y="30" width="0" height="18"><animate attributeName="width" from="0" to="80" dur="0.28s" begin="0.85s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y2"><rect x="16" y="46" width="0" height="18"><animate attributeName="width" from="0" to="560" dur="1.35s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y3"><rect x="16" y="62" width="0" height="18"><animate attributeName="width" from="0" to="260" dur="0.75s" begin="2.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y4"><rect x="16" y="78" width="0" height="18"><animate attributeName="width" from="0" to="90" dur="0.32s" begin="3.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y5"><rect x="16" y="94" width="0" height="18"><animate attributeName="width" from="0" to="380" dur="1.05s" begin="3.85s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y6"><rect x="16" y="110" width="0" height="18"><animate attributeName="width" from="0" to="460" dur="1.45s" begin="4.95s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y7"><rect x="16" y="126" width="0" height="18"><animate attributeName="width" from="0" to="520" dur="1.55s" begin="6.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y8"><rect x="16" y="142" width="0" height="18"><animate attributeName="width" from="0" to="160" dur="0.5s" begin="8.1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y9"><rect x="16" y="158" width="0" height="18"><animate attributeName="width" from="0" to="500" dur="1.35s" begin="8.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y10"><rect x="16" y="174" width="0" height="18"><animate attributeName="width" from="0" to="320" dur="0.88s" begin="10.05s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y11"><rect x="16" y="190" width="0" height="18"><animate attributeName="width" from="0" to="420" dur="1.2s" begin="10.95s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
  </defs>
  <rect width="720" height="220" rx="12" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
  <text x="16" y="13" fill="#64748b" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="0.06em">profile.yaml</text>
  <g clip-path="url(#y0)"><text x="16" y="26" fill="#e2e8f0" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">name: Scott Reed</text></g>
  <g clip-path="url(#y1)"><text x="16" y="42" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">role:</text></g>
  <g clip-path="url(#y2)"><text x="16" y="58" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - Professor of Chemistry, University of Colorado Denver</text></g>
  <g clip-path="url(#y3)"><text x="16" y="74" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - Founder, ChemIllusion</text></g>
  <g clip-path="url(#y4)"><text x="16" y="90" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">focus:</text></g>
  <g clip-path="url(#y5)"><text x="16" y="106" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - molecular informatics and pharmacogenomics</text></g>
  <g clip-path="url(#y6)"><text x="16" y="122" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - chemistry-aware AI and scientific communication tools</text></g>
  <g clip-path="url(#y7)"><text x="16" y="138" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - open-source chemistry software (RDKit ecosystem, MCP, editors)</text></g>
  <g clip-path="url(#y8)"><text x="16" y="154" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">building_now:</text></g>
  <g clip-path="url(#y9)"><text x="16" y="170" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - chemistry-native AI workflows for figures and teaching</text></g>
  <g clip-path="url(#y10)"><text x="16" y="186" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - RDKit–centric developer tooling</text></g>
  <g clip-path="url(#y11)"><text x="16" y="202" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - FOSS components that complement ChemIllusion</text></g>
  <rect x="418" y="190" width="2.5" height="14" fill="#38bdf8" rx="0.5">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.05s" begin="12.15s" repeatCount="indefinite"/>
  </rect>
</svg>
