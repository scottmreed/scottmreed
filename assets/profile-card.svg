<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 248" width="720" height="248" role="img" aria-label="YAML-style profile card typing on screen">
  <defs>
    <linearGradient id="cardbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <clipPath id="y0"><rect x="16" y="14" width="0" height="18"><animate attributeName="width" from="0" to="118" dur="0.55s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y1"><rect x="16" y="32" width="0" height="18"><animate attributeName="width" from="0" to="44" dur="0.28s" begin="0.85s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y2"><rect x="16" y="50" width="0" height="18"><animate attributeName="width" from="0" to="400" dur="1.35s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y3"><rect x="16" y="68" width="0" height="18"><animate attributeName="width" from="0" to="210" dur="0.75s" begin="2.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y4"><rect x="16" y="86" width="0" height="18"><animate attributeName="width" from="0" to="52" dur="0.32s" begin="3.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y5"><rect x="16" y="104" width="0" height="18"><animate attributeName="width" from="0" to="310" dur="1.05s" begin="3.85s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y6"><rect x="16" y="122" width="0" height="18"><animate attributeName="width" from="0" to="430" dur="1.45s" begin="4.95s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y7"><rect x="16" y="140" width="0" height="18"><animate attributeName="width" from="0" to="470" dur="1.55s" begin="6.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y8"><rect x="16" y="158" width="0" height="18"><animate attributeName="width" from="0" to="118" dur="0.5s" begin="8.1s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y9"><rect x="16" y="176" width="0" height="18"><animate attributeName="width" from="0" to="400" dur="1.35s" begin="8.65s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y10"><rect x="16" y="194" width="0" height="18"><animate attributeName="width" from="0" to="260" dur="0.88s" begin="10.05s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
    <clipPath id="y11"><rect x="16" y="212" width="0" height="18"><animate attributeName="width" from="0" to="360" dur="1.2s" begin="10.95s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1"/></rect></clipPath>
  </defs>
  <rect width="720" height="248" rx="12" fill="url(#cardbg)" stroke="#1e293b" stroke-width="1"/>
  <text x="16" y="13" fill="#64748b" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="0.06em">profile.yaml</text>
  <g clip-path="url(#y0)"><text x="16" y="28" fill="#e2e8f0" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">name: Scott Reed</text></g>
  <g clip-path="url(#y1)"><text x="16" y="46" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">role:</text></g>
  <g clip-path="url(#y2)"><text x="16" y="64" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - Professor of Chemistry, University of Colorado Denver</text></g>
  <g clip-path="url(#y3)"><text x="16" y="82" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - Founder, ChemIllusion</text></g>
  <g clip-path="url(#y4)"><text x="16" y="100" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">focus:</text></g>
  <g clip-path="url(#y5)"><text x="16" y="118" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - molecular informatics and pharmacogenomics</text></g>
  <g clip-path="url(#y6)"><text x="16" y="136" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - chemistry-aware AI and scientific communication tools</text></g>
  <g clip-path="url(#y7)"><text x="16" y="154" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - open-source chemistry software (RDKit ecosystem, MCP, editors)</text></g>
  <g clip-path="url(#y8)"><text x="16" y="172" fill="#94a3b8" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">building_now:</text></g>
  <g clip-path="url(#y9)"><text x="16" y="190" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - chemistry-native AI workflows for figures and teaching</text></g>
  <g clip-path="url(#y10)"><text x="16" y="208" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - RDKit–centric developer tooling</text></g>
  <g clip-path="url(#y11)"><text x="16" y="226" fill="#cbd5e1" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="12">  - FOSS components that complement ChemIllusion</text></g>
  <rect x="358" y="212" width="2.5" height="14" fill="#38bdf8" rx="0.5">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.05s" begin="12.15s" repeatCount="indefinite"/>
  </rect>
</svg>
